<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blue Ocean Marine Shipment Tracker</title>
  <meta name="description" content="Tracking" />
  <meta property="og:title" content="Blue Ocean Marine Shipment Tracker" />
  <meta property="og:url" content="https://www.blueoceanmarine.co/tracking/" />
  <meta property="og:description" content="New Tracking Tool for clients" />
  <meta property="og:image" content="https://www.blueoceanmarine.co/static/media/Whatsapp_blueoceanmarine.png" />
  <link rel="icon" type="image/png" href="https://blueoceanmarine.co/static/media/logo-white.8db3e95190e3a472d19e.png">

  <style>
    :root {
      --brand: #0a3c64;
      --brand-600: #095182;
      --bg: #f9fbff;
      --bg-soft: #f1f5fb;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: rgba(15,23,42,.08);
      --ring: rgba(10, 60, 100, .3);
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 10px 25px rgba(0,0,0,.06), 0 2px 6px rgba(0,0,0,.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: var(--bg);
    }

    .intro {
      position: fixed; inset: 0; z-index: 60; display: grid; place-items: center;
      background: #fff;
      transition: opacity 600ms ease;
    }
    .intro.is-fading { opacity: 0; pointer-events: none; }
    .intro .panel { border-radius: 20px; padding: clamp(16px, 4vw, 28px); }
    .intro img { width: min(78vw, 440px); height: auto; display: block; }

    .wrap { min-height: 100dvh; display: grid; place-items: center; padding: 32px 16px; }

    .card {
      width: min(920px, 96vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    .card-header {
      display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center;
      padding: clamp(14px, 2vw, 22px);
      border-bottom: 1px solid var(--border);
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .brand img { height: 36px; width: auto; }
    .brand h1 { font-size: clamp(18px, 2.2vw, 22px); margin: 0; font-weight: 700; }

    .support { display: none; gap: 14px; align-items: center; font-size: 14px; }
    .support a { color: var(--brand); text-decoration: none; font-weight: 600; }
    .support small { color: var(--muted); }
    @media (min-width: 720px) { .support { display: flex; } }

    .card-body { padding: clamp(18px, 3vw, 28px); }

    .hero { display: grid; gap: 10px; justify-items: center; text-align: center; margin-bottom: 16px; }
    .hero h2 { margin: 6px 0 0; font-size: clamp(20px, 2.6vw, 26px); }
    .hero p { margin: 0; color: var(--muted); font-size: 14px; }

    .search { display: grid; gap: 10px; grid-template-columns: 1fr; margin: 16px 0 6px; }
    @media (min-width: 560px) { .search { grid-template-columns: 1fr auto; } }

    .field { position: relative; }
    .field input[type="text"], .field input[type="email"] {
      width: 100%; padding: 14px 44px; border: 1px solid var(--border);
      border-radius: 12px; font-size: 16px; color: var(--text); background: #fff;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .field input::placeholder { color: #94a3b8; }
    .field input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--ring); }
    .field .leading { position: absolute; top: 50%; left: 10px; transform: translateY(-50%); color: var(--muted); }

    button {
      background: var(--brand);
      color: #fff;
      border: none;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: var(--brand-600); }
    button[disabled] { opacity: .6; cursor: not-allowed; }

    .muted { color: var(--muted); font-size: 12px; }

    .spinner { margin: 16px auto; width: 40px; height: 40px; border: 5px solid #e2e8f0; border-top-color: var(--brand); border-radius: 50%; animation: spin 900ms linear infinite; }
    @keyframes spin { to { transform: rotate(360deg) } }

    .result-card { margin-top: 16px; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: #fff; }
    .result-head { background: var(--bg-soft); padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 15px; }
    th, td { padding: 12px 16px; border-bottom: 1px solid var(--border); text-align: left; }
    th { width: 38%; color: var(--muted); font-weight: 600; }
    td { color: var(--text); }

    .footer-note { text-align: center; color: var(--muted); font-size: 12px; padding: 16px; }
  </style>
</head>
<body>
  <!-- Intro overlay -->
  <div id="intro" class="intro" aria-label="Intro animation" role="img">
    <div class="panel">
      <img src="https://www.blueoceanmarine.co/static/media/animation-gif-2.gif" alt="Blue Ocean Marine intro animation" loading="eager" decoding="sync"/>
    </div>
  </div>

  <div class="wrap">
    <main class="card" id="trackerContent">
      <header class="card-header">
        <a class="brand" href="#">
          <img src="https://blueoceanmarine.co/static/media/logo.90b05189673436dbe6ee.png" alt="Blue Ocean Marine Logo"/>
          <h1>Shipment Tracker</h1>
        </a>
        <div></div>
        <div class="support">
          <small>Need help?</small>
          <a href="tel:+201200112284">+20 120 011 2284</a>
          <span aria-hidden="true">•</span>
          <a href="mailto:info@blueoceanmarine.co">info@blueoceanmarine.co</a>
        </div>
      </header>
      <section class="card-body">
        <div class="hero">
          <h2>Track your container, ACID, or B/L</h2>
          <p>Enter your Universal ID / ACID / B/L number below to see live details.</p>
        </div>
        <div class="search">
          <div class="field">
            <span class="leading">🔎</span>
            <input type="text" id="searchInput" list="historyList" placeholder="Enter Universal ID / ACID / B/L #" />
            <datalist id="historyList"></datalist>
          </div>
          <button id="trackBtn" type="button" onclick="trackShipment()">Track Shipment</button>
        </div>
        <div id="result"></div>
      </section>
      <footer class="footer-note">Powered by Blue Ocean Marine &copy; 2025</footer>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const queryID = params.get("id");
    const apiURL = "https://script.google.com/macros/s/AKfycbwUcYOmNLPfC_Ps7xOSs803RlSdF67VxsLziayyJxu49674jWdRp69rjzkSWn4JbB1s/exec";

    (function initIntro(){
      const intro = document.getElementById('intro');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const GIF_DURATION = 4000;
      function reveal(){ intro.classList.add('is-fading'); setTimeout(() => intro.style.display = 'none', 650); }
      window.addEventListener('load', () => { setTimeout(reveal, reduceMotion ? 0 : GIF_DURATION); });
    })();

    window.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('searchInput');
      if (queryID) { input.value = queryID; trackShipment(queryID); }
      input.addEventListener('keypress', e => { if (e.key === 'Enter') trackShipment(); });
    });

    function trackShipment(forcedValue) {
      const input = document.getElementById('searchInput');
      const id = (forcedValue || input.value.trim()).toUpperCase();
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '';
      if (!id) { resultDiv.innerHTML = '<div class="result-card"><div class="result-head">⚠️ Error</div><div class="error">Please enter a valid tracking ID.</div></div>'; return; }
      resultDiv.innerHTML = '<div class="spinner"></div>';
      fetch(`${apiURL}?id=${encodeURIComponent(id)}`)
        .then(r => r.json())
        .then(displayResult)
        .catch(err => { resultDiv.innerHTML = '<div class="error">Fetch error: '+err.message+'</div>'; });
    }

    function displayResult(data) {
      const resultDiv = document.getElementById('result');
      if (!data || data.error) { resultDiv.innerHTML = '<div class="error">'+(data?.error || 'Unknown error')+'</div>'; return; }
      let html = '<div class="result-card"><div class="result-head">📄 Shipment Details</div><table>';
      for (let i = 0; i < data.headers.length; i++) {
        html += `<tr><th>${data.headers[i]}</th><td>${data.row[i]}</td></tr>`;
      }
      html += '</table></div>';
      resultDiv.innerHTML = html;
    }
  </script>
</body>
</html>
